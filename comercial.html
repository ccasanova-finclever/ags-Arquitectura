<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ERP-ARQ">
<meta name="theme-color" content="#285B35">
<title>ERP-ARQ · Comercial</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="stylesheet" href="erp-theme.css">
<style>
  .uf-banner { display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    background:linear-gradient(135deg,#285B35,#1f4a2b); color:#fff; border-radius:var(--radius); padding:16px 20px; margin-bottom:18px; }
  .uf-banner .uf-val { font-size:26px; font-weight:800; }
  .uf-banner .uf-lab { font-size:11px; opacity:.85; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
  .uf-banner .uf-meta { font-size:12px; opacity:.9; }
  .uf-banner .spacer { flex:1; }
  .uf-banner button { background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.35); color:#fff; }

  .board { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; align-items:start; }
  @media (max-width:880px){ .board { grid-template-columns:1fr; } }
  .kcol { background:#F3F1EC; border:1px solid var(--line); border-radius:14px; padding:12px; min-height:140px; transition:background .12s, outline .12s; }
  .kcol.dragover { background:var(--brand-soft); outline:2px dashed var(--brand); }
  .kcol-head { display:flex; align-items:center; gap:8px; margin-bottom:10px; padding:2px 4px; }
  .kcol-icon { font-size:18px; }
  .kcol-title { font-weight:800; font-size:14px; }
  .kcol-count { font-size:11px; font-weight:700; color:var(--ink-soft); background:#fff; border-radius:999px; padding:2px 8px; }
  .kcol-total { margin-left:auto; text-align:right; }
  .kcol-total .t-uf { font-weight:800; font-size:13px; color:var(--brand); }
  .kcol-total .t-clp { font-size:10.5px; color:var(--ink-soft); }

  .kcard { background:#fff; border:1px solid var(--line); border-radius:11px; padding:12px; margin-bottom:10px;
    cursor:grab; box-shadow:0 1px 2px rgba(31,41,55,.05); }
  .kcard:active { cursor:grabbing; }
  .kcard.dragging { opacity:.45; }
  .kcard-title { font-weight:700; font-size:14px; margin-bottom:2px; }
  .kcard-client { font-size:12px; color:var(--ink-soft); margin-bottom:8px; }
  .kcard-row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:6px; }
  .kcard-uf { font-weight:800; font-size:15px; }
  .kcard-clp { font-size:11px; color:var(--ink-soft); }
  .kcard-foot { display:flex; align-items:center; gap:8px; margin-top:9px; flex-wrap:wrap; }
  .kcard-date { font-size:11.5px; color:var(--ink-soft); }
  .kcard-date.soon { color:#B45309; font-weight:700; }
  .kcard-date.over { color:#DC2626; font-weight:700; }
  .kcard-leads { font-size:11.5px; color:var(--ink-soft); }
  .addneg { width:100%; border:1px dashed var(--line); background:#fff; border-radius:10px; padding:9px; cursor:pointer;
    color:var(--ink-soft); font-size:13px; font-weight:600; }
  .addneg:hover { border-color:var(--brand); color:var(--brand); }

  .lead-item { display:flex; align-items:flex-start; gap:8px; background:var(--bg); border:1px solid var(--line);
    border-radius:9px; padding:8px 10px; margin-bottom:8px; }
  .lead-item .li-main { flex:1; }
  .lead-item .li-name { font-weight:600; font-size:13px; }
  .lead-item .li-sub { font-size:11.5px; color:var(--ink-soft); }
  .lead-add { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .hint { font-size:11.5px; color:var(--ink-soft); margin-top:10px; }
</style>
</head>
<body>
<div id="appView" style="display:none">
  <div class="topbar">
    <button class="btn ghost" style="padding:7px 12px" onclick="location.href='index.html'">← Hub</button>
    <span class="logo">ARQ Comercial</span>
    <span class="spacer"></span>
    <span id="userChip" class="chip" style="background:var(--brand-soft);color:var(--brand)"></span>
  </div>

  <div class="wrap">
    <div class="uf-banner">
      <div><div class="uf-lab">UF de hoy</div><div class="uf-val" id="ufVal">…</div></div>
      <div class="uf-meta" id="ufMeta"></div>
      <span class="spacer"></span>
      <button class="btn" onclick="refreshUF()">↻ Actualizar UF</button>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px">
      <div>
        <h2 style="margin-bottom:2px">Pipeline de negocios</h2>
        <div class="muted" style="font-size:13px">Arrastra cada negocio entre tipos. El monto valorizado alimenta el panel ejecutivo.</div>
      </div>
      <button class="btn" onclick="openNew()">+ Nuevo negocio</button>
    </div>

    <div class="board" id="board"></div>
  </div>
</div>

<div id="denyView" style="display:none">
  <div class="login-wrap"><div class="card login-card" style="text-align:center">
    <div class="logo">ERP-ARQ</div>
    <p class="muted" style="margin:16px 0">No tienes permisos para el módulo comercial.</p>
    <button class="btn" onclick="location.href='index.html'">Volver</button>
  </div></div>
</div>

<!-- Modal negocio -->
<div id="negOv" class="modal-ov">
  <div class="modal">
    <div class="m-head"><h3 id="negTitle">Nuevo negocio</h3><button class="m-x" onclick="closeNeg()">✕</button></div>
    <div class="fi">
      <label>Título del negocio</label>
      <input id="ngTitulo" type="text" placeholder="Ej: Anteproyecto Edificio Las Condes">
    </div>
    <div class="fi">
      <label>Cliente</label>
      <input id="ngCliente" type="text" placeholder="Nombre o empresa">
    </div>
    <div class="lead-add" style="grid-template-columns:1fr 1fr">
      <div class="fi"><label>Tipo de negocio</label><select id="ngTipo"></select></div>
      <div class="fi"><label>Estado del negocio</label><select id="ngEstado"></select></div>
    </div>
    <div class="lead-add" style="grid-template-columns:1fr 1fr">
      <div class="fi"><label>Monto valorizado (UF)</label><input id="ngMonto" inputmode="decimal" placeholder="0" oninput="updNegPreview()"></div>
      <div class="fi"><label>Fecha tentativa de cierre</label><input id="ngFecha" type="date"></div>
    </div>
    <div class="muted" id="ngPreview" style="margin:-6px 0 14px;font-size:12.5px"></div>
    <div class="fi">
      <label>Anteproyecto vinculado (opcional)</label>
      <select id="ngProject"><option value="">— Ninguno —</option></select>
    </div>

    <label style="font-size:12.5px;font-weight:600;color:var(--ink-soft)">Leads / contactos interesados</label>
    <div id="leadsList" style="margin:8px 0 10px"></div>
    <div class="lead-add">
      <input id="ldNombre" type="text" placeholder="Nombre">
      <input id="ldEmpresa" type="text" placeholder="Empresa">
    </div>
    <div class="lead-add" style="margin-top:8px">
      <input id="ldContacto" type="text" placeholder="Email o teléfono">
      <button class="btn soft" onclick="addLead()">+ Agregar lead</button>
    </div>

    <div class="fi" style="margin-top:14px">
      <label>Notas</label>
      <textarea id="ngNotas" rows="2" placeholder="Condiciones, próximos pasos…"></textarea>
    </div>
    <div id="ngErr" class="err"></div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn" style="flex:1;justify-content:center" onclick="saveNeg()">Guardar</button>
      <button id="ngDel" class="btn ghost" style="display:none;color:var(--danger);border-color:var(--danger)" onclick="delNeg()">Eliminar</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="erp-helpers.js"></script>
<script>
let CURRENT_USER = null;
let NEGOCIOS = [];
let PROJECTS = [];
let UF = null;
let EDIT_ID = null;
let EDIT_LEADS = [];
let DRAG_ID = null;
const E = ERP.esc;

fbAuth.onAuthStateChanged(async (u) => {
  if (!u || !(u.email || '').toLowerCase().endsWith(ERP.AUTH_DOMAIN)) { location.href = 'index.html'; return; }
  const snap = await db.collection('users').doc(u.email.toLowerCase()).get();
  CURRENT_USER = snap.exists ? snap.data() : { email: u.email, name: u.email, role: 'lectura' };
  if (!ERP.canComercial(CURRENT_USER)) { document.getElementById('denyView').style.display = 'block'; return; }
  document.getElementById('appView').style.display = 'block';
  document.getElementById('userChip').textContent = CURRENT_USER.name + ' · ' + ERP.ROLE_META[CURRENT_USER.role].l;

  document.getElementById('ngTipo').innerHTML = ERP.TIPO_NEGOCIO_ORDER
    .map(k => '<option value="' + k + '">' + ERP.TIPO_NEGOCIO[k].l + '</option>').join('');
  document.getElementById('ngEstado').innerHTML = ERP.ESTADO_NEGOCIO_ORDER
    .map(k => '<option value="' + k + '">' + ERP.ESTADO_NEGOCIO[k].l + '</option>').join('');

  await loadUF();
  await loadData();
});

// ---------- UF ----------
async function loadUF() {
  try {
    const c = await db.collection('config').doc('uf').get();
    if (c.exists) { const d = c.data(); UF = { valor: d.valor, fecha: d.fecha, source: 'caché' }; renderUF(); }
  } catch (e) {}
  await refreshUF(true);
}
async function refreshUF(silent) {
  try {
    const res = await fetch('https://mindicador.cl/api/uf');
    const data = await res.json();
    const item = data.serie[0];
    UF = { valor: item.valor, fecha: (item.fecha || '').slice(0, 10), source: 'mindicador.cl' };
    db.collection('config').doc('uf').set({ valor: UF.valor, fecha: UF.fecha, fetchedAt: new Date().toISOString() }, { merge: true }).catch(() => {});
    renderUF();
    if (!silent) renderBoard();
  } catch (e) {
    if (!UF) { document.getElementById('ufVal').textContent = '—'; document.getElementById('ufMeta').textContent = 'No se pudo obtener la UF.'; }
  }
}
function renderUF() {
  if (!UF) return;
  document.getElementById('ufVal').textContent = ERP.fmtCLP(UF.valor);
  document.getElementById('ufMeta').textContent = 'al ' + fmtFecha(UF.fecha) + ' · fuente: ' + UF.source;
  renderBoard();
}
function fmtFecha(iso) {
  if (!iso) return '—';
  const p = String(iso).slice(0, 10).split('-');
  return p.length === 3 ? p[2] + '-' + p[1] + '-' + p[0] : iso;
}
function ufToClp(uf) { const n = ERP.parseNum(uf); return (n === null || !UF) ? null : n * UF.valor; }

// ---------- Datos ----------
async function loadData() {
  const [negSnap, projSnap] = await Promise.all([
    db.collection('negocios').get(),
    db.collection('projects').get()
  ]);
  NEGOCIOS = negSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  PROJECTS = projSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => Number(b.id) - Number(a.id));
  document.getElementById('ngProject').innerHTML = '<option value="">— Ninguno —</option>' +
    PROJECTS.map(p => '<option value="' + p.id + '">' + E((p.code ? p.code + ' · ' : '') + p.name) + '</option>').join('');
  renderBoard();
}

function renderBoard() {
  const board = document.getElementById('board');
  if (!board) return;
  board.innerHTML = ERP.TIPO_NEGOCIO_ORDER.map(tipo => {
    const m = ERP.TIPO_NEGOCIO[tipo];
    const items = NEGOCIOS.filter(n => (n.tipo || 'proyecto') === tipo);
    const totUF = items.filter(n => n.estado !== 'perdido').reduce((s, n) => s + (ERP.parseNum(n.montoUF) || 0), 0);
    const clp = ufToClp(totUF);
    return '<div class="kcol" data-tipo="' + tipo + '" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropCard(event,\'' + tipo + '\')">' +
      '<div class="kcol-head">' +
        '<span class="kcol-icon">' + m.icon + '</span>' +
        '<span class="kcol-title" style="color:' + m.color + '">' + m.l + '</span>' +
        '<span class="kcol-count">' + items.length + '</span>' +
        '<span class="kcol-total"><div class="t-uf">' + ERP.fmtUF(totUF) + '</div>' +
          (clp != null ? '<div class="t-clp">' + ERP.fmtCLP(clp) + '</div>' : '') + '</span>' +
      '</div>' +
      items.map(renderCard).join('') +
      '<button class="addneg" onclick="openNew(\'' + tipo + '\')">+ Agregar a ' + m.l + '</button>' +
    '</div>';
  }).join('');
}

function renderCard(n) {
  const em = ERP.ESTADO_NEGOCIO[n.estado] || ERP.ESTADO_NEGOCIO.prospecto;
  const uf = ERP.parseNum(n.montoUF);
  const clp = ufToClp(n.montoUF);
  const nLeads = (n.leads || []).length;
  return '<div class="kcard" draggable="true" ondragstart="dragStart(event,\'' + n.id + '\')" ondragend="dragEnd(event)" onclick="openEdit(\'' + n.id + '\')">' +
    '<div class="kcard-title">' + E(n.titulo || 'Sin título') + '</div>' +
    (n.cliente ? '<div class="kcard-client">' + E(n.cliente) + '</div>' : '') +
    '<span class="chip" style="background:' + em.bg + ';color:' + em.color + '">' + em.l + '</span>' +
    '<div class="kcard-row">' +
      '<div><div class="kcard-uf">' + (uf ? ERP.fmtUF(uf) : '<span class="muted">sin valor</span>') + '</div>' +
        (clp != null && uf ? '<div class="kcard-clp">' + ERP.fmtCLP(clp) + '</div>' : '') + '</div>' +
    '</div>' +
    '<div class="kcard-foot">' +
      (n.fechaCierre ? '<span class="kcard-date ' + dateClass(n.fechaCierre) + '">📅 ' + fmtFecha(n.fechaCierre) + '</span>' : '') +
      (nLeads ? '<span class="kcard-leads">👤 ' + nLeads + ' lead' + (nLeads > 1 ? 's' : '') + '</span>' : '') +
    '</div>' +
  '</div>';
}

function dateClass(iso) {
  if (!iso) return '';
  const today = new Date().toISOString().slice(0, 10);
  if (iso < today) return 'over';
  const in15 = new Date(Date.now() + 15 * 86400000).toISOString().slice(0, 10);
  if (iso <= in15) return 'soon';
  return '';
}

// ---------- Drag & drop ----------
function dragStart(e, id) { DRAG_ID = id; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', id); }
function dragEnd(e) { e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.kcol.dragover').forEach(c => c.classList.remove('dragover')); }
function dragOver(e) { e.preventDefault(); e.currentTarget.classList.add('dragover'); }
function dragLeave(e) { if (e.currentTarget === e.target) e.currentTarget.classList.remove('dragover'); }
async function dropCard(e, tipo) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const id = DRAG_ID || e.dataTransfer.getData('text/plain');
  DRAG_ID = null;
  const n = NEGOCIOS.find(x => x.id === id);
  if (!n || n.tipo === tipo) return;
  const prev = n.tipo;
  n.tipo = tipo;
  renderBoard();
  try { await db.collection('negocios').doc(id).set({ tipo, updatedAt: new Date().toISOString() }, { merge: true }); }
  catch (err) { n.tipo = prev; renderBoard(); alert('No se pudo mover: ' + err.message); }
}

// ---------- Leads (en el modal) ----------
function renderLeads() {
  const box = document.getElementById('leadsList');
  if (!EDIT_LEADS.length) { box.innerHTML = '<div class="muted" style="font-size:12.5px">Sin leads aún.</div>'; return; }
  box.innerHTML = EDIT_LEADS.map((l, i) =>
    '<div class="lead-item"><div class="li-main"><div class="li-name">' + E(l.nombre || '—') + '</div>' +
    '<div class="li-sub">' + E([l.empresa, l.contacto].filter(Boolean).join(' · ') || '') + '</div></div>' +
    '<button class="icon-btn" style="width:28px;height:28px;font-size:13px" onclick="delLead(' + i + ')">✕</button></div>'
  ).join('');
}
function addLead() {
  const nombre = document.getElementById('ldNombre').value.trim();
  const empresa = document.getElementById('ldEmpresa').value.trim();
  const contacto = document.getElementById('ldContacto').value.trim();
  if (!nombre && !empresa && !contacto) return;
  EDIT_LEADS.push({ nombre, empresa, contacto });
  document.getElementById('ldNombre').value = '';
  document.getElementById('ldEmpresa').value = '';
  document.getElementById('ldContacto').value = '';
  renderLeads();
}
function delLead(i) { EDIT_LEADS.splice(i, 1); renderLeads(); }

// ---------- Nuevo / Editar ----------
function openNew(tipo) {
  EDIT_ID = null;
  EDIT_LEADS = [];
  document.getElementById('negTitle').textContent = 'Nuevo negocio';
  document.getElementById('ngTitulo').value = '';
  document.getElementById('ngCliente').value = '';
  document.getElementById('ngTipo').value = tipo && ERP.TIPO_NEGOCIO[tipo] ? tipo : 'proyecto';
  document.getElementById('ngEstado').value = 'prospecto';
  document.getElementById('ngMonto').value = '';
  document.getElementById('ngFecha').value = '';
  document.getElementById('ngProject').value = '';
  document.getElementById('ngNotas').value = '';
  document.getElementById('ngErr').textContent = '';
  document.getElementById('ngDel').style.display = 'none';
  renderLeads();
  updNegPreview();
  document.getElementById('negOv').classList.add('open');
}

function openEdit(id) {
  const n = NEGOCIOS.find(x => x.id === id);
  if (!n) return;
  EDIT_ID = id;
  EDIT_LEADS = (n.leads || []).map(l => ({ nombre: l.nombre || '', empresa: l.empresa || '', contacto: l.contacto || '' }));
  document.getElementById('negTitle').textContent = 'Editar negocio';
  document.getElementById('ngTitulo').value = n.titulo || '';
  document.getElementById('ngCliente').value = n.cliente || '';
  document.getElementById('ngTipo').value = n.tipo || 'proyecto';
  document.getElementById('ngEstado').value = n.estado || 'prospecto';
  document.getElementById('ngMonto').value = n.montoUF || '';
  document.getElementById('ngFecha').value = n.fechaCierre || '';
  document.getElementById('ngProject').value = n.projectId || '';
  document.getElementById('ngNotas').value = n.notas || '';
  document.getElementById('ngErr').textContent = '';
  document.getElementById('ngDel').style.display = 'inline-flex';
  renderLeads();
  updNegPreview();
  document.getElementById('negOv').classList.add('open');
}
function closeNeg() { document.getElementById('negOv').classList.remove('open'); }

function updNegPreview() {
  const clp = ufToClp(document.getElementById('ngMonto').value);
  document.getElementById('ngPreview').textContent = clp ? ('En pesos hoy ≈ ' + ERP.fmtCLP(clp)) : '';
}

async function saveNeg() {
  const err = document.getElementById('ngErr');
  err.textContent = '';
  const titulo = document.getElementById('ngTitulo').value.trim();
  if (!titulo) { err.textContent = 'El título es obligatorio.'; return; }
  const data = {
    titulo,
    cliente: document.getElementById('ngCliente').value.trim(),
    tipo: document.getElementById('ngTipo').value,
    estado: document.getElementById('ngEstado').value,
    montoUF: document.getElementById('ngMonto').value.trim(),
    fechaCierre: document.getElementById('ngFecha').value,
    projectId: document.getElementById('ngProject').value,
    leads: EDIT_LEADS,
    notas: document.getElementById('ngNotas').value.trim(),
    updatedAt: new Date().toISOString(),
    updatedBy: CURRENT_USER.email
  };
  try {
    if (EDIT_ID) {
      await db.collection('negocios').doc(EDIT_ID).set(data, { merge: true });
      const n = NEGOCIOS.find(x => x.id === EDIT_ID); if (n) Object.assign(n, data);
    } else {
      data.createdAt = new Date().toISOString();
      data.createdBy = CURRENT_USER.email;
      const ref = await db.collection('negocios').add(data);
      NEGOCIOS.push(Object.assign({ id: ref.id }, data));
    }
    renderBoard();
    closeNeg();
  } catch (e) {
    err.textContent = 'Error al guardar: ' + e.message;
  }
}

async function delNeg() {
  if (!EDIT_ID || !confirm('¿Eliminar este negocio? Esta acción no se puede deshacer.')) return;
  try {
    await db.collection('negocios').doc(EDIT_ID).delete();
    NEGOCIOS = NEGOCIOS.filter(x => x.id !== EDIT_ID);
    renderBoard();
    closeNeg();
  } catch (e) {
    document.getElementById('ngErr').textContent = 'Error al eliminar: ' + e.message;
  }
}
</script>
</body>
</html>
