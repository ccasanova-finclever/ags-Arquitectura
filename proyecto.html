<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ERP-ARQ">
<meta name="theme-color" content="#285B35">
<title>ERP-ARQ · Anteproyecto</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="stylesheet" href="erp-theme.css">
<style>
  .tabs { display:flex; gap:6px; flex-wrap:wrap; margin:18px 0; }
  .tab {
    border:1px solid var(--line); background:var(--surface); border-radius:999px;
    padding:8px 16px; font-size:13.5px; font-weight:600; cursor:pointer; color:var(--ink-soft);
  }
  .tab.on { background:var(--brand); color:#fff; border-color:var(--brand); }
  .ph { padding:40px 20px; text-align:center; color:var(--ink-soft); }
  .head-line { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }

  .sec-title { font-size:15px; font-weight:700; margin:4px 0 14px; color:var(--ink); }
  .sec + .sec { margin-top:26px; padding-top:22px; border-top:1px solid var(--line); }

  /* Tabla de datos editable */
  .dtable { width:100%; border-collapse:collapse; font-size:13px; }
  .dtable th { text-align:left; font-size:11.5px; font-weight:700; color:var(--ink-soft);
    padding:6px 8px; border-bottom:1px solid var(--line); white-space:nowrap; }
  .dtable td { padding:4px 6px; border-bottom:1px solid var(--line); vertical-align:middle; }
  .dtable input, .dtable select {
    width:100%; min-width:70px; border:1px solid var(--line); border-radius:8px;
    padding:7px 8px; font-size:15px; background:#fff; color:var(--ink); font-family:inherit;
  }
  .dtable input:disabled, .dtable select:disabled { background:#FAF7F2; color:var(--ink); border-color:transparent; }
  .dtable input:focus, .dtable select:focus { outline:2px solid var(--brand-soft); border-color:var(--brand); }
  .tbl-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }

  /* Grilla de campos (Alturas) */
  .fgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px 16px; }
  @media (max-width:760px){ .fgrid { grid-template-columns:1fr 1fr; } }
  @media (max-width:480px){ .fgrid { grid-template-columns:1fr; } }

  /* KPIs */
  .kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  @media (max-width:760px){ .kpis { grid-template-columns:1fr 1fr; } }
  .kpi { background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:14px; }
  .kpi .k-l { font-size:11.5px; font-weight:600; color:var(--ink-soft); }
  .kpi .k-v { font-size:20px; font-weight:800; margin-top:4px; color:var(--ink); }
  .kpi .k-s { font-size:11.5px; color:var(--ink-soft); margin-top:2px; }

  .cumple-y { color:#16A34A; font-weight:800; }
  .cumple-n { color:#DC2626; font-weight:800; }
  .cumple-na{ color:var(--ink-soft); }

  .save-bar { display:flex; align-items:center; gap:14px; margin-top:20px; }
  .save-msg { font-size:13px; color:var(--ink-soft); }
  .save-msg.ok { color:#16A34A; }
  .save-msg.err { color:#DC2626; }

  .row-actions { display:flex; gap:8px; margin-top:12px; }
  .icon-btn {
    border:1px solid var(--line); background:#fff; border-radius:8px; width:34px; height:34px;
    cursor:pointer; color:var(--danger); font-size:15px;
  }
  .check-list { display:flex; flex-direction:column; gap:10px; }
  .check-list label { display:flex; align-items:center; gap:10px; font-size:14px; cursor:pointer; }
  .check-list input { width:18px; height:18px; }
  .ro-note { font-size:12.5px; color:var(--ink-soft); margin-bottom:14px; }

  /* Cuadros calculados (resultado read-only) */
  .ctable { width:100%; border-collapse:collapse; font-size:12.5px; }
  .ctable th { text-align:right; font-size:11px; font-weight:700; color:var(--ink-soft);
    padding:6px 9px; border-bottom:2px solid var(--line); white-space:nowrap; }
  .ctable th:first-child { text-align:left; }
  .ctable td { padding:5px 9px; border-bottom:1px solid var(--line); text-align:right; white-space:nowrap; }
  .ctable td:first-child { text-align:left; font-weight:600; }
  .ctable tr.tot td { font-weight:800; border-top:2px solid var(--brand); border-bottom:none;
    background:var(--brand-soft); color:var(--brand); }
  .cuadro-h { display:flex; align-items:center; gap:8px; margin:0 0 10px; }
  .cuadro-tag { font-size:11px; font-weight:800; padding:2px 9px; border-radius:999px; color:#fff; }
  .grp-head th { text-align:center; font-size:10.5px; color:var(--brand); border-bottom:1px solid var(--brand-soft);
    text-transform:uppercase; letter-spacing:.4px; }
  .verif { padding:10px 14px; border-radius:10px; font-size:13px; font-weight:600; margin-top:12px; }
  .verif.ok { background:#DCFCE7; color:#166534; }
  .verif.warn { background:#FEE2E2; color:#991B1B; }
</style>
</head>
<body>
<div id="appView" style="display:none">
  <div class="topbar">
    <button class="btn ghost" style="padding:7px 12px" onclick="location.href='index.html'">← Volver</button>
    <span class="logo">ERP-ARQ</span>
    <span class="spacer"></span>
    <span id="userChip" class="chip" style="background:var(--brand-soft);color:var(--brand)"></span>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="head-line">
        <span id="pCode" class="chip" style="background:#F3F4F6;color:#374151"></span>
        <span id="pStatus" class="chip"></span>
      </div>
      <h2 id="pName" style="margin-top:10px"></h2>
      <div id="pMeta" class="muted" style="margin-top:6px"></div>
    </div>

    <div class="tabs" id="tabs"></div>
    <div id="tabContent" class="card"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="erp-helpers.js"></script>
<script src="erp-calc.js"></script>
<script>
let CURRENT_USER = null;
let PROJECT = null;
let EDIT = false;            // ¿el usuario puede editar datos técnicos?
let CUR_TAB = 'resumen';

const PID = new URLSearchParams(location.search).get('id');
const E = ERP.esc;

// Tabs visibles según rol (visibilidad fina llega en Fase 5)
function tabsForRole(user) {
  const all = [
    { k: 'resumen', l: 'Resumen' },
    { k: 'terreno', l: 'Terreno' },
    { k: 'normativa', l: 'Normativa' },
    { k: 'alturas', l: 'Alturas' },
    { k: 'superficies', l: 'Superficies' },
    { k: 'estocp', l: 'Est. / Ocupación' },
    { k: 'documentos', l: 'Documentos' },
    { k: 'bitacora', l: 'Bitácora' }
  ];
  if (user.role === 'lectura') return all.filter(t => ['resumen', 'documentos'].includes(t.k));
  if (user.role === 'comercial') return all.filter(t => ['resumen', 'superficies', 'documentos'].includes(t.k));
  return all;
}

// ---------- Firestore base (Write-First con rollback) ----------
async function saveSection(patch) {
  const prev = JSON.parse(JSON.stringify(PROJECT));
  Object.assign(PROJECT, patch);
  try {
    await db.collection('projects').doc(PID).set(patch, { merge: true });
    return true;
  } catch (e) {
    PROJECT = prev;
    throw e;
  }
}

// ---------- Auth + carga ----------
fbAuth.onAuthStateChanged(async (u) => {
  if (!u || !(u.email || '').toLowerCase().endsWith(ERP.AUTH_DOMAIN)) {
    location.href = 'index.html';
    return;
  }
  const snap = await db.collection('users').doc(u.email.toLowerCase()).get();
  CURRENT_USER = snap.exists ? snap.data() : { email: u.email, name: u.email, role: 'lectura' };
  EDIT = ERP.canEditProject(CURRENT_USER);
  await loadProject();
});

async function loadProject() {
  if (!PID) { location.href = 'index.html'; return; }
  const snap = await db.collection('projects').doc(PID).get();
  if (!snap.exists) {
    alert('Anteproyecto no encontrado.');
    location.href = 'index.html';
    return;
  }
  PROJECT = { id: snap.id, ...snap.data() };
  render();
}

function render() {
  document.getElementById('appView').style.display = 'block';
  const meta = ERP.ROLE_META[CURRENT_USER.role] || ERP.ROLE_META.lectura;
  document.getElementById('userChip').textContent = CURRENT_USER.name + ' · ' + meta.l;
  renderHeader();

  const tabs = tabsForRole(CURRENT_USER);
  if (!tabs.find(t => t.k === CUR_TAB)) CUR_TAB = tabs[0].k;
  document.getElementById('tabs').innerHTML = tabs.map(t =>
    '<button class="tab' + (t.k === CUR_TAB ? ' on' : '') + '" onclick="selTab(\'' + t.k + '\')">' + t.l + '</button>'
  ).join('');
  renderTab(CUR_TAB);
}

function renderHeader() {
  const sm = ERP.STATUS_META[PROJECT.status] || ERP.STATUS_META.estudio;
  document.getElementById('pCode').textContent = PROJECT.code || PROJECT.id;
  const stEl = document.getElementById('pStatus');
  stEl.textContent = sm.l;
  stEl.style.background = sm.bg;
  stEl.style.color = sm.color;
  document.getElementById('pName').textContent = PROJECT.name || '';
  document.getElementById('pMeta').textContent =
    '📍 ' + (PROJECT.comuna || '—') + ' · Creado ' + (PROJECT.createdAt || '—') + ' por ' + (PROJECT.createdBy || '—');
}

function selTab(k) {
  CUR_TAB = k;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  const tabs = tabsForRole(CURRENT_USER);
  const idx = tabs.findIndex(t => t.k === k);
  if (idx >= 0) document.querySelectorAll('.tab')[idx].classList.add('on');
  renderTab(k);
}

function renderTab(k) {
  const c = document.getElementById('tabContent');
  if (k === 'resumen') c.innerHTML = tabResumen();
  else if (k === 'terreno') c.innerHTML = tabTerreno();
  else if (k === 'normativa') c.innerHTML = tabNormativa();
  else if (k === 'alturas') c.innerHTML = tabAlturas();
  else if (k === 'superficies') { c.innerHTML = tabSuperficies(); recalcSuperficies(); }
  else if (k === 'estocp') c.innerHTML = tabPlaceholder('Estacionamientos y Carga de Ocupación', 'Fase 4');
  else if (k === 'documentos') c.innerHTML = tabPlaceholder('Documentos del proyecto', 'Fase 4 — almacenamiento en Firebase Storage');
  else if (k === 'bitacora') c.innerHTML = tabPlaceholder('Bitácora de cambios', 'Fase 4');
}

function tabPlaceholder(title, fase) {
  return '<div class="ph">🚧 <strong>' + E(title) + '</strong><br>' + E(fase) + '</div>';
}

function roNote() {
  return EDIT ? '' : '<div class="ro-note">👁️ Vista de solo lectura para tu rol. La edición de datos técnicos corresponde a Arquitecto, Director o Super Administrador.</div>';
}

function dis() { return EDIT ? '' : ' disabled'; }

// ============================================================
//  RESUMEN
// ============================================================
function tabResumen() {
  const lotes = (PROJECT.terreno && PROJECT.terreno.lotes) || [];
  const supNeta = lotes.reduce((s, l) => s + (ERP.parseNum(l.supNeta) || 0), 0);
  const par = (PROJECT.normativa && PROJECT.normativa.params) || {};
  const get = k => par[k] || {};
  const dens = get('densidadBruta'), constr = get('coefConstr'), viv = get('cantViviendas');

  // Cumplimiento global
  let cumplen = 0, evaluables = 0, fallan = [];
  ERP.NOR_PARAMS.forEach(p => {
    const r = par[p.k] || {};
    const res = p.op === 'manual'
      ? (r.cumple ? (r.cumple === 'SÍ') : null)
      : ERP.cumpleEval(p.op, r.proyectado, r.permitido);
    if (res === true) { cumplen++; evaluables++; }
    else if (res === false) { evaluables++; fallan.push(p.l); }
  });

  const statusOpts = Object.entries(ERP.STATUS_META).map(([k, m]) =>
    '<option value="' + k + '"' + (PROJECT.status === k ? ' selected' : '') + '>' + m.l + '</option>'
  ).join('');

  return '' +
    '<div class="sec">' +
      '<div class="sec-title">Indicadores del anteproyecto</div>' +
      '<div class="kpis">' +
        kpi('Comuna', PROJECT.comuna || '—', lotes.length + ' lote(s)') +
        kpi('Sup. Neta Terreno', ERP.fmtNum(supNeta, 2) + ' m²', 'suma de lotes') +
        kpi('N° Viviendas', viv.proyectado != null && viv.proyectado !== '' ? ERP.fmtNum(viv.proyectado) : '—',
            viv.permitido ? 'máx ' + ERP.fmtNum(viv.permitido) : '') +
        kpi('Cumplimiento', evaluables ? cumplen + '/' + evaluables : '—', 'parámetros que cumplen') +
        kpi('Densidad Bruta', dens.proyectado ? ERP.fmtNum(dens.proyectado, 1) : '—',
            dens.permitido ? 'máx ' + ERP.fmtNum(dens.permitido, 1) : '') +
        kpi('Constructibilidad', constr.proyectado ? ERP.fmtNum(constr.proyectado, 2) : '—',
            constr.permitido ? 'máx ' + ERP.fmtNum(constr.permitido, 2) : '') +
      '</div>' +
      (fallan.length ? '<div class="ro-note" style="margin-top:14px;color:#DC2626">⚠️ No cumplen: ' + E(fallan.join(' · ')) + '</div>' : '') +
    '</div>' +

    '<div class="sec">' +
      '<div class="sec-title">Estado</div>' +
      (EDIT
        ? '<div class="fi" style="max-width:280px"><label>Estado del anteproyecto</label>' +
          '<select id="rsStatus">' + statusOpts + '</select></div>' +
          '<div class="save-bar"><button class="btn" onclick="saveStatus()">Actualizar estado</button>' +
          '<span id="rsMsg" class="save-msg"></span></div>'
        : '<div class="muted">Estado actual: <strong>' + E((ERP.STATUS_META[PROJECT.status] || {}).l || PROJECT.status) + '</strong></div>') +
    '</div>';
}

function kpi(l, v, s) {
  return '<div class="kpi"><div class="k-l">' + E(l) + '</div><div class="k-v">' + E(v) + '</div>' +
    (s ? '<div class="k-s">' + E(s) + '</div>' : '') + '</div>';
}

async function saveStatus() {
  const v = document.getElementById('rsStatus').value;
  const msg = document.getElementById('rsMsg');
  msg.className = 'save-msg'; msg.textContent = 'Guardando…';
  try {
    await saveSection({ status: v });
    renderHeader();
    msg.className = 'save-msg ok'; msg.textContent = '✓ Estado actualizado';
  } catch (e) {
    msg.className = 'save-msg err'; msg.textContent = 'Error: ' + e.message;
  }
}

// ============================================================
//  TERRENO
// ============================================================
function tabTerreno() {
  return '' + roNote() +
    '<div class="sec">' +
      '<div class="sec-title">Lotes del terreno</div>' +
      '<div class="tbl-scroll"><table class="dtable"><thead><tr>' +
        '<th>#</th>' + ERP.TER_LOTE_FIELDS.map(f => '<th>' + E(f.l) + '</th>').join('') +
        (EDIT ? '<th></th>' : '') +
      '</tr></thead><tbody id="lotesBody">' +
        renderLoteRows() +
      '</tbody></table></div>' +
      (EDIT ? '<div class="row-actions"><button class="btn soft" onclick="addLote()">+ Agregar lote</button></div>' : '') +
    '</div>' +

    '<div class="sec">' +
      '<div class="sec-title">Polígonos para cálculo de densidad bruta</div>' +
      '<div class="tbl-scroll"><table class="dtable"><thead><tr>' +
        '<th>Polígono</th><th>Lado A (m)</th><th>Lado B (m)</th><th>Sup. A×B (m²)</th>' +
      '</tr></thead><tbody id="poliBody">' + renderPoliRows() + '</tbody></table></div>' +
    '</div>' +

    saveBar('saveTerreno');
}

function renderLoteRows() {
  const lotes = (PROJECT.terreno && PROJECT.terreno.lotes) || [];
  if (!lotes.length && !EDIT) return '<tr><td colspan="' + (ERP.TER_LOTE_FIELDS.length + 1) + '" class="muted">Sin lotes registrados.</td></tr>';
  const rows = lotes.length ? lotes : (EDIT ? [{}] : []);
  return rows.map((lo, i) => loteRow(lo, i)).join('');
}

function loteRow(lo, i) {
  return '<tr class="lote-row"><td>' + (i + 1) + '</td>' +
    ERP.TER_LOTE_FIELDS.map(f => {
      const v = lo[f.k] == null ? '' : lo[f.k];
      const t = f.type === 'date' ? 'date' : (f.type === 'num' ? 'text' : 'text');
      const im = f.type === 'num' ? ' inputmode="decimal"' : '';
      return '<td><input data-k="' + f.k + '" type="' + t + '"' + im + ' value="' + E(v) + '"' + dis() + '></td>';
    }).join('') +
    (EDIT ? '<td><button class="icon-btn" title="Eliminar lote" onclick="delLote(this)">✕</button></td>' : '') +
    '</tr>';
}

function renderPoliRows() {
  const polis = (PROJECT.terreno && PROJECT.terreno.poligonos) || [];
  const base = polis.length ? polis : [{ nombre: 'P1' }, { nombre: 'P2' }, { nombre: 'P3' }, { nombre: 'P4' }];
  return base.map((p, i) => {
    const a = p.ladoA == null ? '' : p.ladoA, b = p.ladoB == null ? '' : p.ladoB;
    const sup = (ERP.parseNum(a) || 0) * (ERP.parseNum(b) || 0);
    return '<tr class="poli-row">' +
      '<td><input data-k="nombre" value="' + E(p.nombre || ('P' + (i + 1))) + '"' + dis() + ' style="min-width:60px"></td>' +
      '<td><input data-k="ladoA" inputmode="decimal" value="' + E(a) + '"' + dis() + ' oninput="recalcPoli()"></td>' +
      '<td><input data-k="ladoB" inputmode="decimal" value="' + E(b) + '"' + dis() + ' oninput="recalcPoli()"></td>' +
      '<td class="poli-sup">' + (sup ? ERP.fmtNum(sup, 2) : '—') + '</td>' +
    '</tr>';
  }).join('');
}

function recalcPoli() {
  document.querySelectorAll('#poliBody .poli-row').forEach(r => {
    const a = ERP.parseNum(r.querySelector('[data-k="ladoA"]').value) || 0;
    const b = ERP.parseNum(r.querySelector('[data-k="ladoB"]').value) || 0;
    r.querySelector('.poli-sup').textContent = (a * b) ? ERP.fmtNum(a * b, 2) : '—';
  });
}

function addLote() {
  document.getElementById('lotesBody').insertAdjacentHTML('beforeend',
    loteRow({}, document.querySelectorAll('#lotesBody .lote-row').length));
}
function delLote(btn) {
  btn.closest('.lote-row').remove();
  // Renumerar
  document.querySelectorAll('#lotesBody .lote-row').forEach((r, i) => r.firstElementChild.textContent = i + 1);
}

function collectTerreno() {
  const lotes = [...document.querySelectorAll('#lotesBody .lote-row')].map(r => {
    const o = {};
    r.querySelectorAll('[data-k]').forEach(inp => { o[inp.dataset.k] = inp.value.trim(); });
    return o;
  }).filter(o => Object.values(o).some(v => v !== ''));
  const poligonos = [...document.querySelectorAll('#poliBody .poli-row')].map(r => {
    const o = {};
    r.querySelectorAll('[data-k]').forEach(inp => { o[inp.dataset.k] = inp.value.trim(); });
    return o;
  });
  const terreno = Object.assign({}, PROJECT.terreno, { lotes, poligonos });
  return { terreno };
}

async function saveTerreno() { await doSave('saveTerreno', collectTerreno()); }

// ============================================================
//  NORMATIVA
// ============================================================
function tabNormativa() {
  const par = (PROJECT.normativa && PROJECT.normativa.params) || {};
  const esp = (PROJECT.normativa && PROJECT.normativa.especiales) || {};

  const rows = ERP.NOR_PARAMS.map(p => {
    const r = par[p.k] || {};
    const proj = r.proyectado == null ? '' : r.proyectado;
    const perm = r.permitido == null ? '' : r.permitido;
    let cumpleCell;
    if (p.op === 'manual') {
      const opts = ['', 'SÍ', 'NO'].map(o =>
        '<option value="' + o + '"' + ((r.cumple || '') === o ? ' selected' : '') + '>' + (o || '—') + '</option>').join('');
      cumpleCell = '<select data-k="cumple"' + dis() + '>' + opts + '</select>';
    } else {
      cumpleCell = '<span class="cumple-cell" id="cum-' + p.k + '">' + cumpleBadge(ERP.cumpleEval(p.op, proj, perm)) + '</span>';
    }
    return '<tr class="nor-row" data-key="' + p.k + '" data-op="' + p.op + '">' +
      '<td style="min-width:200px;white-space:normal">' + E(p.l) + (p.u ? ' <span class="muted">(' + E(p.u) + ')</span>' : '') + '</td>' +
      '<td><input data-k="proyectado" ' + (p.op === 'manual' ? '' : 'inputmode="decimal" ') + 'value="' + E(proj) + '"' + dis() + ' oninput="recalcNor(this)"></td>' +
      '<td><input data-k="permitido" ' + (p.op === 'manual' ? '' : 'inputmode="decimal" ') + 'value="' + E(perm) + '"' + dis() + ' oninput="recalcNor(this)"></td>' +
      '<td>' + cumpleCell + '</td>' +
    '</tr>';
  }).join('');

  const chk = (k, l) => '<label><input type="checkbox" data-esp="' + k + '"' + (esp[k] ? ' checked' : '') + dis() + '> ' + E(l) + '</label>';

  return '' + roNote() +
    '<div class="sec">' +
      '<div class="sec-title">Cumplimiento de condiciones urbanísticas</div>' +
      '<div class="tbl-scroll"><table class="dtable"><thead><tr>' +
        '<th>Parámetro</th><th>Proyectado</th><th>Permitido</th><th>Cumple</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table></div>' +
    '</div>' +

    '<div class="sec">' +
      '<div class="sec-title">Normas especiales aplicables</div>' +
      '<div class="check-list">' +
        chk('fusionArt63', 'Beneficio Fusión Art.63 LGUC (incremento constructibilidad 30%)') +
        chk('conjuntoArmonico', 'Conjunto Armónico Art.2.6.5 OGUC (incremento constructibilidad 50%)') +
        chk('incrementoAltura', 'Incremento 25% altura por Conjunto Armónico Art.2.6.9 OGUC') +
        chk('sombras', 'Sombras Art.2.6.11 OGUC') +
      '</div>' +
    '</div>' +

    saveBar('saveNormativa');
}

function cumpleBadge(res) {
  if (res === true) return '<span class="cumple-y">SÍ ✓</span>';
  if (res === false) return '<span class="cumple-n">NO ✗</span>';
  return '<span class="cumple-na">—</span>';
}

function recalcNor(inp) {
  const tr = inp.closest('.nor-row');
  const op = tr.dataset.op;
  if (op === 'manual') return;
  const proj = tr.querySelector('[data-k="proyectado"]').value;
  const perm = tr.querySelector('[data-k="permitido"]').value;
  const cell = tr.querySelector('.cumple-cell');
  if (cell) cell.innerHTML = cumpleBadge(ERP.cumpleEval(op, proj, perm));
}

function collectNormativa() {
  const params = {};
  document.querySelectorAll('.nor-row').forEach(tr => {
    const key = tr.dataset.key, op = tr.dataset.op;
    const o = {
      proyectado: tr.querySelector('[data-k="proyectado"]').value.trim(),
      permitido: tr.querySelector('[data-k="permitido"]').value.trim()
    };
    if (op === 'manual') o.cumple = tr.querySelector('[data-k="cumple"]').value;
    params[key] = o;
  });
  const especiales = {};
  document.querySelectorAll('[data-esp]').forEach(c => { especiales[c.dataset.esp] = c.checked; });
  const normativa = Object.assign({}, PROJECT.normativa, { params, especiales });
  return { normativa };
}

async function saveNormativa() { await doSave('saveNormativa', collectNormativa()); }

// ============================================================
//  ALTURAS
// ============================================================
function tabAlturas() {
  const a = PROJECT.alturas || {};
  const fields = ERP.ALT_FIELDS.map(f => {
    const v = a[f.k] == null ? '' : a[f.k];
    return '<div class="fi"><label>' + E(f.l) + '</label>' +
      '<input data-k="' + f.k + '" inputmode="decimal" value="' + E(v) + '"' + dis() + '></div>';
  }).join('');

  return '' + roNote() +
    '<div class="sec">' +
      '<div class="sec-title">Datos de alturas a ingresar</div>' +
      '<div class="fgrid">' + fields + '</div>' +
      '<div class="ro-note" style="margin-top:16px">El estudio de sombras, rampas y volúmenes teóricos se incorpora en la Fase 3 junto al motor de cálculo.</div>' +
    '</div>' +
    saveBar('saveAlturas');
}

function collectAlturas() {
  const alturas = Object.assign({}, PROJECT.alturas);
  document.querySelectorAll('#tabContent [data-k]').forEach(inp => {
    if (inp.closest('.fgrid')) alturas[inp.dataset.k] = inp.value.trim();
  });
  return { alturas };
}

async function saveAlturas() { await doSave('saveAlturas', collectAlturas()); }

// ============================================================
//  SUPERFICIES (motor erp-calc)
// ============================================================
const CUADRO_META = {
  municipal:    { l: 'Municipal',    color: '#D97706' },
  construccion: { l: 'Construcción', color: '#B45309' },
  comercial:    { l: 'Comercial',    color: '#DB2777' }
};

function cuadrosForRole(user) {
  if (['superadmin', 'director', 'arquitecto'].includes(user.role)) return ['municipal', 'construccion', 'comercial'];
  if (user.role === 'municipal') return ['municipal'];
  if (user.role === 'construccion') return ['construccion'];
  if (user.role === 'comercial') return ['comercial'];
  return [];
}

function tabSuperficies() {
  // Encabezados agrupados de la tabla de entrada
  let groups = [], last = null;
  ERP.SUP_FIELDS.forEach(f => {
    if (f.g !== last) { groups.push({ g: f.g, n: 1 }); last = f.g; }
    else groups[groups.length - 1].n++;
  });
  const grpRow = '<tr class="grp-head"><th></th>' +
    groups.map(gr => '<th colspan="' + gr.n + '">' + E(gr.g) + '</th>').join('') +
    (EDIT ? '<th></th>' : '') + '</tr>';
  const colRow = '<tr><th>Nivel</th>' +
    ERP.SUP_FIELDS.map(f => '<th>' + E(f.l) + '</th>').join('') +
    (EDIT ? '<th></th>' : '') + '</tr>';

  return '' + roNote() +
    '<div class="sec">' +
      '<div class="sec-title">Datos de superficies por nivel</div>' +
      '<div class="ro-note">Ingresa una fila por nivel, de abajo hacia arriba (subterráneos, pisos, sala de máquinas). Los cuadros se recalculan automáticamente.</div>' +
      '<div class="tbl-scroll"><table class="dtable">' +
        '<thead>' + grpRow + colRow + '</thead>' +
        '<tbody id="pisosBody">' + renderPisoRows() + '</tbody>' +
      '</table></div>' +
      (EDIT ? '<div class="row-actions"><button class="btn soft" onclick="addPiso()">+ Agregar nivel</button></div>' : '') +
      (EDIT ? '<div class="save-bar"><button class="btn" id="btn-savePisos" onclick="savePisos()">Guardar superficies</button>' +
        '<span id="msg-savePisos" class="save-msg"></span></div>' : '') +
    '</div>' +
    '<div class="sec"><div class="sec-title">Cuadros calculados</div>' +
      '<div id="cuadrosBox"></div>' +
      '<div id="verifBox"></div>' +
    '</div>';
}

function renderPisoRows() {
  const pisos = PROJECT.pisos || [];
  const rows = pisos.length ? pisos : (EDIT ? [{ nivel: '' }] : []);
  if (!rows.length) return '<tr><td colspan="' + (ERP.SUP_FIELDS.length + 1) + '" class="muted">Sin niveles registrados.</td></tr>';
  return rows.map(p => pisoRow(p)).join('');
}

function pisoRow(p) {
  return '<tr class="piso-row">' +
    '<td><input data-k="nivel" value="' + E(p.nivel == null ? '' : p.nivel) + '"' + dis() +
      ' oninput="recalcSuperficies()" style="min-width:54px;font-weight:700"></td>' +
    ERP.SUP_FIELDS.map(f => {
      const v = p[f.k] == null ? '' : p[f.k];
      return '<td><input data-k="' + f.k + '" inputmode="decimal" value="' + E(v) + '"' + dis() +
        ' oninput="recalcSuperficies()"></td>';
    }).join('') +
    (EDIT ? '<td><button class="icon-btn" title="Eliminar nivel" onclick="delPiso(this)">✕</button></td>' : '') +
    '</tr>';
}

function addPiso() {
  document.getElementById('pisosBody').insertAdjacentHTML('beforeend', pisoRow({ nivel: '' }));
}
function delPiso(btn) { btn.closest('.piso-row').remove(); recalcSuperficies(); }

function collectPisosFromDOM() {
  return [...document.querySelectorAll('#pisosBody .piso-row')].map(r => {
    const o = {};
    r.querySelectorAll('[data-k]').forEach(inp => { o[inp.dataset.k] = inp.value.trim(); });
    return o;
  }).filter(o => o.nivel !== '' || ERP.SUP_FIELDS.some(f => o[f.k] && o[f.k] !== ''));
}

function recalcSuperficies() {
  const box = document.getElementById('cuadrosBox');
  if (!box) return;
  const pisos = document.querySelector('#pisosBody') ? collectPisosFromDOM() : (PROJECT.pisos || []);
  const res = ERPCalc.computeSurfaces(pisos);
  const roles = cuadrosForRole(CURRENT_USER);
  box.innerHTML = roles.map(t => renderCuadro(t, res)).join('');
  renderVerif(res);
}

function renderCuadro(type, res) {
  const m = CUADRO_META[type];
  const cols = CUADRO_COLS[type];
  const header = '<tr><th>Nivel</th>' + cols.map(c => '<th>' + E(c.l) + '</th>').join('') + '</tr>';
  const body = res.levels.map(r => {
    const data = r[type === 'construccion' ? 'constr' : (type === 'comercial' ? 'com' : 'muni')];
    return '<tr><td>' + E(r.nivel) + '</td>' +
      cols.map(c => '<td>' + cell(data[c.k]) + '</td>').join('') + '</tr>';
  }).join('');
  const tt = res.totals[type === 'construccion' ? 'constr' : (type === 'comercial' ? 'com' : 'muni')];
  const totRow = '<tr class="tot"><td>TOTAL</td>' +
    cols.map(c => '<td>' + cell(tt[c.k]) + '</td>').join('') + '</tr>';
  return '<div style="margin-bottom:26px">' +
    '<div class="cuadro-h"><span class="cuadro-tag" style="background:' + m.color + '">' + m.l + '</span></div>' +
    '<div class="tbl-scroll"><table class="ctable"><thead>' + header + '</thead><tbody>' + body + totRow + '</tbody></table></div>' +
    '</div>';
}

function cell(v) {
  if (v == null || isNaN(v)) return '—';
  const n = ERPCalc.r2(v);
  return n === 0 ? '<span class="muted">0</span>' : ERP.fmtNum(n, 2);
}

const CUADRO_COLS = {
  municipal: [
    { k: 'X', l: 'Útil Deptos' }, { k: 'Y', l: 'Comercio' }, { k: 'Z', l: 'Bodegas' },
    { k: 'AA', l: 'Est.' }, { k: 'AB', l: 'Uso Excl.' }, { k: 'AC', l: 'Uso Común' },
    { k: 'AD', l: 'ÚTIL' }, { k: 'AE', l: 'COMÚN' }, { k: 'AF', l: 'TOTAL' }
  ],
  construccion: [
    { k: 'AI', l: 'Int. Útil' }, { k: 'AJ', l: 'Int. Común' }, { k: 'AK', l: 'Int. Subte' },
    { k: 'AL', l: 'Ext. Útil Terr.' }, { k: 'AM', l: 'Ext. Común Terr.' }, { k: 'AN', l: 'Cubiertas' },
    { k: 'AO', l: 'TOTAL LOSA' }, { k: 'AP', l: 'Radier' }, { k: 'AQ', l: 'TOTAL CONSTR.' }
  ],
  comercial: [
    { k: 'AT', l: 'Útil Int. Deptos' }, { k: 'AU', l: 'Terraza 50%' }, { k: 'AV', l: 'Jardín 25%' },
    { k: 'AW', l: 'Útil Comercio' }, { k: 'AX', l: 'ÚTIL TOTAL' }, { k: 'AY', l: 'Bodegas' }, { k: 'AZ', l: 'Común' }
  ]
};

// Resumen informativo de los totales clave de SUPxPISO.
// La verificación cruzada formal (SUPxPISO ↔ SUPxPRO por producto)
// se incorpora en la Fase 3b junto al cuadro "Superficies por producto".
function renderVerif(res) {
  const box = document.getElementById('verifBox');
  if (!box) return;
  const roles = cuadrosForRole(CURRENT_USER);
  const parts = [];
  if (roles.includes('municipal')) parts.push('Total Municipal ' + ERP.fmtNum(ERPCalc.r2(res.totals.muni.AF), 2) + ' m²');
  if (roles.includes('construccion')) parts.push('Total Construido ' + ERP.fmtNum(ERPCalc.r2(res.totals.constr.AQ), 2) + ' m²');
  if (roles.includes('comercial')) parts.push('Útil Comercial ' + ERP.fmtNum(ERPCalc.r2(res.totals.com.AX), 2) + ' m²');
  if (!parts.length) { box.innerHTML = ''; return; }
  box.innerHTML = '<div class="verif ok">Σ ' + parts.join(' · ') + '</div>' +
    '<div class="ro-note" style="margin-top:6px">La verificación cruzada con el cuadro por producto se incorpora en la Fase 3b.</div>';
}

async function savePisos() {
  await doSave('savePisos', { pisos: collectPisosFromDOM() });
}

// ============================================================
//  Guardado común
// ============================================================
function saveBar(fn) {
  if (!EDIT) return '';
  return '<div class="save-bar"><button class="btn" id="btn-' + fn + '" onclick="' + fn + '()">Guardar cambios</button>' +
    '<span id="msg-' + fn + '" class="save-msg"></span></div>';
}

async function doSave(fn, patch) {
  const btn = document.getElementById('btn-' + fn);
  const msg = document.getElementById('msg-' + fn);
  if (btn) btn.disabled = true;
  if (msg) { msg.className = 'save-msg'; msg.textContent = 'Guardando…'; }
  try {
    await saveSection(patch);
    if (msg) { msg.className = 'save-msg ok'; msg.textContent = '✓ Guardado'; }
  } catch (e) {
    if (msg) { msg.className = 'save-msg err'; msg.textContent = 'Error: ' + e.message; }
  } finally {
    if (btn) btn.disabled = false;
  }
}
</script>
