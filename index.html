<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ERP-ARQ">
<meta name="theme-color" content="#285B35">
<title>ERP-ARQ · Anteproyectos</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="stylesheet" href="erp-theme.css">
<style>
  .proj-head { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:8px; }
  .proj-code { font-size:12px; font-weight:700; color:var(--ink-soft); letter-spacing:.5px; }
  .proj-name { font-size:16px; font-weight:700; margin:2px 0 6px; }
  .proj-meta { font-size:13px; color:var(--ink-soft); }
  .filters { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; align-items:center; }
  .filters input, .filters select {
    border:1px solid var(--line); border-radius:10px; padding:9px 12px; font-size:16px; background:#fff;
  }
  .filters input { flex:1; min-width:180px; }
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="loginView" class="login-wrap">
  <div class="card login-card">
    <img src="logo-ags-arq.png" alt="AGS Arquitectura" style="width:120px;height:120px;border-radius:22px;display:block;margin:0 auto 14px">
    <div class="logo" style="text-align:center">ERP-ARQ</div>
    <div class="sub" style="text-align:center">Control de Anteproyectos · AGS Arquitectura</div>
    <div class="fi">
      <label>Correo corporativo</label>
      <input id="liEmail" type="email" placeholder="nombre@agsnegocios.cl" autocomplete="username">
    </div>
    <div class="fi">
      <label>Contraseña</label>
      <input id="liPass" type="password" autocomplete="current-password">
    </div>
    <div id="liErr" class="err"></div>
    <button class="btn" style="width:100%;justify-content:center" onclick="doLogin()">Ingresar</button>
    <p class="muted" style="text-align:center;margin-top:14px">
      ¿Primera vez? <a href="#" onclick="doRegister();return false">Crear cuenta</a> con tu correo @agsnegocios.cl
    </p>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="appView" style="display:none">
  <div class="topbar">
    <span class="logo">ERP-ARQ</span>
    <span class="muted">Anteproyectos</span>
    <span class="spacer"></span>
    <span id="userChip" class="chip" style="background:var(--brand-soft);color:var(--brand)"></span>
    <button id="btnAdmin" class="btn ghost" style="padding:7px 12px;display:none" onclick="location.href='admin.html'">⚙︎ Admin</button>
    <button class="btn ghost" style="padding:7px 12px" onclick="doLogout()">Salir</button>
  </div>

  <div class="wrap">
    <div class="filters">
      <input id="fSearch" type="search" placeholder="Buscar por código, nombre o comuna…" oninput="renderProjects()">
      <select id="fStatus" onchange="renderProjects()">
        <option value="">Todos los estados</option>
      </select>
      <button id="btnNew" class="btn" style="display:none" onclick="openNewModal()">+ Nuevo Anteproyecto</button>
    </div>
    <div id="grid" class="g3"></div>
  </div>
</div>

<!-- ===================== MODAL NUEVO ===================== -->
<div id="newOv" class="modal-ov">
  <div class="modal">
    <div class="m-head">
      <h3>Nuevo Anteproyecto</h3>
      <button class="m-x" onclick="closeNewModal()">✕</button>
    </div>
    <div class="fi">
      <label>Código (convención AAMMDD-NN)</label>
      <input id="npCode" type="text" placeholder="260610-01">
    </div>
    <div class="fi">
      <label>Nombre del proyecto</label>
      <input id="npName" type="text" placeholder="Ej: Edificio José Pedro Alessandri 1880">
    </div>
    <div class="fi">
      <label>Comuna</label>
      <input id="npComuna" type="text" placeholder="Ej: Ñuñoa">
    </div>
    <div id="npErr" class="err"></div>
    <button class="btn" style="width:100%;justify-content:center" onclick="createProject()">Crear</button>
  </div>
</div>

<!-- ===================== SCRIPTS ===================== -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="erp-helpers.js"></script>
<script>
let CURRENT_USER = null;
let PROJECTS = [];
let _lastHash = { projects: '' };
let _unsubProjects = null;

function hashSnap(docs) { return docs.map(d => d.id).sort().join(','); }

// ---------- Firestore base ----------
async function fsSet(col, id, data) { await db.collection(col).doc(String(id)).set(data, { merge: true }); }
async function fsDel(col, id) { await db.collection(col).doc(String(id)).delete(); }

// ---------- Auth ----------
function validDomain(email) { return (email || '').toLowerCase().endsWith(ERP.AUTH_DOMAIN); }

async function doLogin() {
  const email = document.getElementById('liEmail').value.trim().toLowerCase();
  const pass = document.getElementById('liPass').value;
  const err = document.getElementById('liErr');
  err.textContent = '';
  if (!validDomain(email)) { err.textContent = 'Solo correos ' + ERP.AUTH_DOMAIN; return; }
  try {
    await fbAuth.signInWithEmailAndPassword(email, pass);
  } catch (e) {
    err.textContent = traducirAuthError(e);
  }
}

async function doRegister() {
  const email = document.getElementById('liEmail').value.trim().toLowerCase();
  const pass = document.getElementById('liPass').value;
  const err = document.getElementById('liErr');
  err.textContent = '';
  if (!validDomain(email)) { err.textContent = 'Solo correos ' + ERP.AUTH_DOMAIN; return; }
  if (!pass || pass.length < 6) { err.textContent = 'La contraseña debe tener al menos 6 caracteres.'; return; }
  try {
    await fbAuth.createUserWithEmailAndPassword(email, pass);
  } catch (e) {
    err.textContent = traducirAuthError(e);
  }
}

function traducirAuthError(e) {
  const map = {
    'auth/invalid-credential': 'Correo o contraseña incorrectos.',
    'auth/user-not-found': 'Usuario no registrado. Usa "Crear cuenta".',
    'auth/wrong-password': 'Contraseña incorrecta.',
    'auth/email-already-in-use': 'Ese correo ya tiene cuenta. Usa "Ingresar".',
    'auth/weak-password': 'Contraseña muy débil (mínimo 6 caracteres).',
    'auth/too-many-requests': 'Demasiados intentos. Espera unos minutos.'
  };
  return map[e.code] || ('Error: ' + e.message);
}

function doLogout() { fbAuth.signOut(); }

// Materializa el doc de usuario al primer login. Rol viene del seed
// (las security rules impiden auto-asignarse otro rol).
async function ensureUserDoc(email) {
  const ref = db.collection('users').doc(email);
  const snap = await ref.get();
  if (snap.exists) return snap.data();
  const seed = ERP.SEED_USERS[email];
  const data = {
    email,
    name: seed ? seed.name : email.split('@')[0],
    role: seed ? seed.role : 'lectura',
    active: true,
    createdAt: ERP.today()
  };
  await ref.set(data);
  return data;
}

fbAuth.onAuthStateChanged(async (u) => {
  if (u && validDomain(u.email)) {
    try {
      CURRENT_USER = await ensureUserDoc(u.email.toLowerCase());
    } catch (e) {
      document.getElementById('liErr').textContent = 'No se pudo cargar tu perfil: ' + e.message;
      fbAuth.signOut();
      return;
    }
    showApp();
  } else {
    CURRENT_USER = null;
    if (_unsubProjects) { _unsubProjects(); _unsubProjects = null; }
    document.getElementById('appView').style.display = 'none';
    document.getElementById('loginView').style.display = 'flex';
  }
});

// ---------- App ----------
function showApp() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('appView').style.display = 'block';
  const meta = ERP.ROLE_META[CURRENT_USER.role] || ERP.ROLE_META.lectura;
  document.getElementById('userChip').textContent = CURRENT_USER.name + ' · ' + meta.l;
  document.getElementById('btnNew').style.display = ERP.canCreateProject(CURRENT_USER) ? 'inline-flex' : 'none';
  document.getElementById('btnAdmin').style.display = ERP.canManageUsers(CURRENT_USER) ? 'inline-flex' : 'none';

  const sel = document.getElementById('fStatus');
  if (sel.options.length === 1) {
    Object.entries(ERP.STATUS_META).forEach(([k, m]) => {
      const o = document.createElement('option');
      o.value = k; o.textContent = m.l;
      sel.appendChild(o);
    });
  }
  setupProjectsListener();
}

function setupProjectsListener() {
  if (_unsubProjects) return;
  _unsubProjects = db.collection('projects').onSnapshot(snap => {
    const h = hashSnap(snap.docs);
    if (h === _lastHash.projects && PROJECTS.length === snap.docs.length) return;
    _lastHash.projects = h;
    PROJECTS = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderProjects();
  }, e => {
    document.getElementById('grid').innerHTML =
      '<div class="empty">Error cargando proyectos: ' + ERP.esc(e.message) + '</div>';
  });
}

function renderProjects() {
  const q = (document.getElementById('fSearch').value || '').toLowerCase();
  const st = document.getElementById('fStatus').value;
  const grid = document.getElementById('grid');

  let list = PROJECTS.slice().sort((a, b) => Number(b.id) - Number(a.id));
  if (st) list = list.filter(p => p.status === st);
  if (q) list = list.filter(p =>
    (p.code || '').toLowerCase().includes(q) ||
    (p.name || '').toLowerCase().includes(q) ||
    (p.comuna || '').toLowerCase().includes(q));

  if (!list.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">' +
      (PROJECTS.length ? 'Sin resultados para el filtro actual.' :
        'Aún no hay anteproyectos. ' +
        (ERP.canCreateProject(CURRENT_USER) ? 'Crea el primero con el botón "+ Nuevo Anteproyecto".' : '')) +
      '</div>';
    return;
  }

  grid.innerHTML = list.map(p => {
    const sm = ERP.STATUS_META[p.status] || ERP.STATUS_META.estudio;
    return '<div class="card project" onclick="openProject(\'' + p.id + '\')">' +
      '<div class="proj-head">' +
        '<span class="proj-code">' + ERP.esc(p.code) + '</span>' +
        '<span class="chip" style="background:' + sm.bg + ';color:' + sm.color + '">' + sm.l + '</span>' +
      '</div>' +
      '<div class="proj-name">' + ERP.esc(p.name) + '</div>' +
      '<div class="proj-meta">📍 ' + ERP.esc(p.comuna || '—') + ' · Creado ' + ERP.esc(p.createdAt || '—') + '</div>' +
    '</div>';
  }).join('');
}

function openProject(id) { location.href = 'proyecto.html?id=' + encodeURIComponent(id); }

// ---------- Crear anteproyecto (Write-First con rollback) ----------
function openNewModal() {
  document.getElementById('npCode').value = ERP.codePrefix() + '-';
  document.getElementById('npName').value = '';
  document.getElementById('npComuna').value = '';
  document.getElementById('npErr').textContent = '';
  document.getElementById('newOv').classList.add('open');
}
function closeNewModal() { document.getElementById('newOv').classList.remove('open'); }

async function createProject() {
  const code = document.getElementById('npCode').value.trim();
  const name = document.getElementById('npName').value.trim();
  const comuna = document.getElementById('npComuna').value.trim();
  const err = document.getElementById('npErr');
  err.textContent = '';
  if (!code || !name) { err.textContent = 'Código y nombre son obligatorios.'; return; }

  const id = String(Date.now());
  const proj = {
    id, code, name, comuna,
    status: 'estudio',
    createdAt: ERP.today(),
    createdBy: CURRENT_USER.email,
    terreno: { comuna, lotes: [] },
    normativa: {},
    alturas: {},
    pisos: [],
    productos: [],
    estacionamientos: {},
    ocupacion: {}
  };

  const prevData = [...PROJECTS];
  try {
    PROJECTS = [...PROJECTS, proj];
    _lastHash.projects = hashSnap(PROJECTS.map(p => ({ id: String(p.id) })));
    await fsSet('projects', id, proj);
    renderProjects();
    closeNewModal();
  } catch (e) {
    PROJECTS = prevData;
    _lastHash.projects = hashSnap(PROJECTS.map(p => ({ id: String(p.id) })));
    err.textContent = 'Error al crear: ' + e.message;
  }
}

// Enter para login
document.getElementById('liPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
